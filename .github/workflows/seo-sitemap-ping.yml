name: SEO Sitemap Ping
on:
  workflow_run:
    workflows: ["Build and Deploy"]
    types: [completed]
jobs:
  ping-search-engines:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch match data        # ← ADD THIS
        run: node scripts/fetch-matches.mjs

      - name: Ping Bing IndexNow
        run: node scripts/ping-indexnow.mjs
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: Ping Bing Sitemap
        run: |
          curl -s "https://www.bing.com/ping?sitemap=https://rojadirectaenvivo.top/sitemap-index.xml"
          echo "✅ Bing sitemap ping sent"
