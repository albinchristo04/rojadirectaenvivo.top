name: Build and Deploy

on:
  schedule:
    - cron: '0 */3 * * *'    # Every 3 hours
  push:
    branches: [main]
  workflow_dispatch:           # Manual trigger

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch match data + download flags
        run: node scripts/fetch-matches.mjs

      - name: Build Astro site
        run: npm run build
        env:
          SITE_URL: https://rojadirectaenvivo.top

      - name: Create IndexNow Key File
        run: |
          if [ -n "${{ secrets.INDEXNOW_KEY }}" ]; then
            echo "${{ secrets.INDEXNOW_KEY }}" > dist/${{ secrets.INDEXNOW_KEY }}.txt
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: toproja
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Ping Bing IndexNow
        run: node scripts/ping-indexnow.mjs
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
